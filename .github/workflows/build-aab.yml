name: Build Android AAB

on:
  push:
    branches: [main]
    paths:
      - 'twa-android/**'
      - '.github/workflows/build-aab.yml'
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      version_code:
        description: "Version code (integer)"
        required: true
        default: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > rute-release.keystore
          echo "=== SHA1 Fingerprint keystore yang dipakai ==="
          keytool -list -keystore rute-release.keystore -storepass rutetravel2024 -alias rute-key 2>&1 | grep -i sha1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build release AAB
        working-directory: twa-android
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code || github.run_number }}
          VERSION_NAME: ${{ github.event.inputs.version_name || format('1.0.{0}', github.run_number) }}
        run: |
          gradle bundleRelease --no-daemon \
            -PVERSION_CODE=$VERSION_CODE \
            -PVERSION_NAME=$VERSION_NAME

      - name: List outputs
        run: find twa-android -name "*.aab" 2>/dev/null

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rute-travel-aab-v${{ github.event.inputs.version_name || format('1.0.{0}', github.run_number) }}
          path: |
            twa-android/app/build/outputs/bundle/release/*.aab
            rute-release.keystore
          retention-days: 30
