name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      version_code:
        description: "Version code (integer, increment each release)"
        required: true
        default: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Clone TWA template
        run: |
          git clone https://github.com/chromeos/pwa-play-billing.git twa-template || \
          git clone https://github.com/GoogleChrome/android-browser-helper.git twa-template

      - name: Generate TWA project from scratch
        run: |
          mkdir -p twa-project/app/src/main/res/values
          mkdir -p twa-project/app/src/main/res/xml

          # build.gradle (root)
          cat > twa-project/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # settings.gradle
          echo "include ':app'" > twa-project/settings.gradle

          # gradle wrapper
          mkdir -p twa-project/gradle/wrapper
          cat > twa-project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cd twa-project
          gradle wrapper --gradle-version 8.4 2>/dev/null || true

          # app/build.gradle
          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "app.rute.travel"
                  minSdk 19
                  targetSdk 34
                  versionCode ${{ github.event.inputs.version_code }}
                  versionName "${{ github.event.inputs.version_name }}"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              signingConfigs {
                  release {
                      storeFile file("../../rute-release.keystore")
                      storePassword "rutetravel2024"
                      keyAlias "rute-key"
                      keyPassword "rutetravel2024"
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://workspaceapi-server-production-7ba1.up.railway.app/" />
                      <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="@color/colorPrimary" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https"
                              android:host="workspaceapi-server-production-7ba1.up.railway.app" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">RUTE Travel</string>
          </resources>
          EOF

          # colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#a85e28</color>
          </resources>
          EOF

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore rute-release.keystore \
            -alias rute-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass rutetravel2024 \
            -keypass rutetravel2024 \
            -dname "CN=RUTE Travel, OU=Mobile, O=Ride Inovasi Digital, L=Balikpapan, ST=Kalimantan Timur, C=ID"

      - name: Build release AAB
        working-directory: twa-project
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rute-travel-aab-v${{ github.event.inputs.version_name }}
          path: |
            twa-project/app/build/outputs/bundle/release/*.aab
            rute-release.keystore
          retention-days: 30
